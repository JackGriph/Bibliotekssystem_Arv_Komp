<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#674A40"/>
  <g transform="translate(6,5)">
    <!-- Book spine -->
    <rect x="2" y="2" width="3" height="18" rx="1" fill="#FCAF38"/>
    <!-- Book cover -->
    <rect x="5" y="1" width="13" height="20" rx="1.5" fill="#50A3A4"/>
    <!-- Pages -->
    <rect x="7" y="3" width="9" height="16" rx="1" fill="#f7f3f1"/>
    <!-- Text lines -->
    <line x1="9" y1="7" x2="14" y2="7" stroke="#674A40" stroke-width="1" stroke-linecap="round"/>
    <line x1="9" y1="10" x2="14" y2="10" stroke="#674A40" stroke-width="1" stroke-linecap="round"/>
    <line x1="9" y1="13" x2="12" y2="13" stroke="#674A40" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
